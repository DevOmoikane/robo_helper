services:
  robot:
    build:
      context: .
      dockerfile: foxy.Dockerfile
    container_name: robot
    network_mode: "host"
    privileged: true
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
    volumes:
      - .:/ws_bot
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XDG_RUNTIME_DIR}/pulse:${XDG_RUNTIME_DIR}/pulse
      - /etc/localtime:/etc/localtime:ro
    stdin_open: true
    tty: true
    entrypoint: /ros_entrypoint.sh
    command: bash
  rviz:
    build:
      context: .
      dockerfile: foxy.Dockerfile
    container_name: rviz
    network_mode: "host"
    depends_on:
      - robot
    privileged: true
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
      - ROS_IP=robot
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
    volumes:
      - .:/ws_bot
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XDG_RUNTIME_DIR}/pulse:${XDG_RUNTIME_DIR}/pulse
      - /etc/localtime:/etc/localtime:ro
    stdin_open: true
    tty: true
    entrypoint: /ros_entrypoint.sh
    command: ros2 run rviz2 rviz2
